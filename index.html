<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ε-δ Explorer - Redirecting...</title>
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #0f0f0d;
  color: #e8e6de;
  font-family: 'JetBrains Mono', monospace;
}
.loader {
  text-align: center;
}
.spinner {
  border: 3px solid rgba(155, 143, 232, 0.3);
  border-top: 3px solid #9b8fe8;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
.message {
  font-size: 14px;
  opacity: 0.7;
}
.manual-links {
  margin-top: 30px;
  font-size: 12px;
}
.manual-links a {
  color: #9b8fe8;
  text-decoration: none;
  margin: 0 10px;
}
.manual-links a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="loader">
  <div class="spinner"></div>
  <div class="message">Detecting device...</div>
  <div class="manual-links">
    <a href="desktop.html">Desktop Version</a> |
    <a href="mobile.html">Mobile Version</a>
  </div>
</div>

<script>
// Device detection and redirect
function isMobileDevice() {
  // Check user agent
  const userAgent = navigator.userAgent || navigator.vendor || window.opera;
  const mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i;

  // Check screen size
  const isSmallScreen = window.innerWidth <= 768;

  // Check touch capability
  const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  return mobileRegex.test(userAgent) || (isSmallScreen && isTouchDevice);
}

// Redirect based on device
window.addEventListener('load', function() {
  setTimeout(function() {
    if (isMobileDevice()) {
      window.location.href = 'mobile.html';
    } else {
      window.location.href = 'desktop.html';
    }
  }, 500);
});
</script>
</body>
</html>
